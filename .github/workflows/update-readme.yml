name: Auto-Update README

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'        # don't trigger on README-only changes
      - '.github/**'       # don't trigger on workflow changes

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need previous commit to generate diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate diff and update README
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -u .github/scripts/update_readme.py

      - name: Commit updated README if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull --rebase origin main
          git add README.md
          git diff --staged --quiet || git commit -m "docs: auto-update README for recent changes"
          git push
